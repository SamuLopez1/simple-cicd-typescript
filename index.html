<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator :)</title>
</head>
<body>
  <h1>Simple Calculator =)</h1>

  <input type="number" id="num1" placeholder="First number" />

  <select id="operation">
    <option value="+">+</option>
    <option value="-">−</option>
    <option value="*">×</option>
    <option value="/">÷</option>
  </select>

  <input type="number" id="num2" placeholder="Second number" />

  <button type="button" id="btnCalculate">Calculate</button>

  <p>Result: <strong id="result">—</strong></p>

  <!-- Link to the compiled JS -->
  <script src="sum.js"></script>
  <script>
    document.getElementById('btnCalculate').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      var operation = document.getElementById('operation').value;
      var resultElement = document.getElementById('result');

      try {
        var result;

        if (operation === '+') {
          result = sum(a, b);
        } else if (operation === '-') {
          result = subtract(a, b);
        } else if (operation === '*') {
          result = multiply(a, b);
        } else if (operation === '/') {
          result = divide(a, b);
        }

        resultElement.textContent = result;
      } catch (error) {
        resultElement.textContent = error.message;
      }
    });
  </script>
</body>
</html>
